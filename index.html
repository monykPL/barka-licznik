<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strona monykPL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="bg-body">

    <div id="audio-unlocker">
        <button id="test-audio-btn">KLIKNIJ, ABY SPRAWDZIĆ DŹWIĘK</button>
        <p style="font-size: 11px; color: #aaa; margin-top: 5px;">(Musisz usłyszeć 3 sekundy Barki)</p>
    </div>

    <div id="chat-container">
        <div id="chat-messages"></div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Napisz coś (lub /test)...">
            <button onclick="sendMessage()">Wyślij</button>
            <div id="small-clock">00:00:00</div>
        </div>
    </div>

    <div id="center-content">
        <p class="label">Do godziny 21:37 pozostało:</p>
        <h1 id="countdown">00:00:00</h1>
        <p id="author">made by: monykPL</p>
    </div>

    <audio id="barka-audio" preload="auto">
        <source src="barka.mp3" type="audio/mpeg">
    </audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="script.js"></script>
</body>
</html>
