<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barka 21:37 - monykPL</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body id="bg-body">

    <div class="top-controls">
        <div class="sound-section">
            <button class="orange-btn" onclick="checkSound()">KLIKNIJ, ABY SPRAWDZIĆ DŹWIĘK</button>
            <p class="sub-text">(Musisz usłyszeć 3 sekundy Barki)</p>
        </div>
        <button id="party-btn" class="grey-btn" onclick="toggleParty()">IMPREZA: WYŁĄCZONA</button>
    </div>

    <div class="center-content">
        <p class="timer-desc">Do godziny 21:37 pozostało:</p>
        <div id="timer">00:00:00</div>
        <p class="footer-text">made by: monykPL</p>
    </div>

    <div class="chat-container">
        <div id="chat-box"></div>
        <div class="input-row">
            <input type="text" id="tekst" placeholder="Napisz coś (lub /test)...">
            <button id="send-btn" onclick="sendMsg()">Wyślij</button>
            <span id="timestamp-display"></span>
        </div>
    </div>

    <audio id="barka-audio" src="barka.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
